<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Sequenza Numerica</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #00f2fe;
            --accent-hover: #4facfe;
            --border-radius: 8px;
            
            /* Variabili dinamiche controllate da JS */
            --print-cols: 3;
            --print-size: 14pt;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            background-color: var(--panel-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            border-top: 4px solid var(--accent-color);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        details {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: var(--border-radius);
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        summary {
            font-weight: bold;
            color: var(--accent-color);
            cursor: pointer;
            padding: 0.5rem 0;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--accent-color);
        }

        details[open] summary::after {
            content: '▲';
        }

        .advanced-options {
            padding-top: 1rem;
            border-top: 1px solid #334155;
            margin-top: 0.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 480px) {
            .advanced-options {
                grid-template-columns: 1fr;
            }
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #334155;
            border-radius: var(--border-radius);
            background-color: #1e293b;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(0, 242, 254, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        #btn-generate {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-color));
            color: #0f172a;
        }

        #btn-generate:hover {
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
            transform: translateY(-2px);
        }

        #btn-print {
            background-color: #334155;
            color: var(--text-color);
            display: none;
        }

        #btn-print:hover {
            background-color: #475569;
        }

        .results-wrapper {
            margin-top: 2rem;
            width: 100%;
            max-width: 800px;
        }

        #output {
            display: grid;
            grid-template-columns: repeat(var(--print-cols), 1fr);
            gap: 10px;
        }

        .number-box {
            background-color: var(--panel-color);
            border: 1px solid #334155;
            padding: 0.75rem 0;
            text-align: center;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            /* font-weight: bold rimosso per lasciare il testo normale */
            font-size: var(--print-size);
            color: var(--accent-color);
            break-inside: avoid;
            page-break-inside: avoid; 
        }

        .number-box u {
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @media print {
            body {
                background-color: white;
                color: black;
                padding: 0;
            }
            .container, .results-wrapper {
                box-shadow: none;
                border: none;
                max-width: 100%;
                padding: 0;
                margin: 0;
            }
            .form-group, .btn-group, h1, details {
                display: none !important;
            }
            #output {
                display: grid !important;
                grid-template-columns: repeat(var(--print-cols), 1fr) !important;
                gap: 5px !important;
            }
            .number-box {
                background-color: transparent;
                border: 1px solid #000;
                color: black;
                font-size: var(--print-size);
                padding: 8px 0;
            }
            .number-box u {
                text-decoration-thickness: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sys Gen Sequenza</h1>
        
        <div class="form-group">
            <label for="startNumber">Numero di partenza:</label>
            <input type="text" id="startNumber" inputmode="numeric" pattern="[0-9]*" placeholder="Es. 001" value="001" required>
        </div>

        <div class="form-group">
            <label for="quantity">Quantità da generare:</label>
            <select id="quantity">
                <option value="25">25 Numeri</option>
                <option value="50">50 Numeri</option>
                <option value="75">75 Numeri</option>
                <option value="100">100 Numeri</option>
                <option value="A4" style="font-weight:bold; color: #00f2fe; background:#0f172a;" selected>Riempi Foglio A4</option>
            </select>
        </div>

        <details>
            <summary>Opzioni Avanzate di Stampa</summary>
            <div class="advanced-options">
                <div class="form-group">
                    <label for="columns">Numero Colonne:</label>
                    <input type="number" id="columns" value="3" min="1" max="10">
                </div>
                <div class="form-group">
                    <label for="fontSize">Grandezza Font (pt):</label>
                    <input type="number" id="fontSize" value="16" min="8" max="72">
                </div>
            </div>
        </details>

        <div class="btn-group">
            <button id="btn-generate">Genera</button>
            <button id="btn-print" onclick="window.print()">Stampa</button>
        </div>
    </div>

    <div class="results-wrapper">
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('btn-generate').addEventListener('click', function() {
            const startNumberInput = document.getElementById('startNumber').value.trim();
            const quantityVal = document.getElementById('quantity').value;
            const columns = parseInt(document.getElementById('columns').value) || 3;
            const fontSize = parseInt(document.getElementById('fontSize').value) || 14;
            const outputDiv = document.getElementById('output');
            
            outputDiv.innerHTML = '';

            if (!/^\d+$/.test(startNumberInput)) {
                alert('Inserisci un numero di partenza valido (es. 0034).');
                return;
            }

            document.documentElement.style.setProperty('--print-cols', columns);
            document.documentElement.style.setProperty('--print-size', fontSize + 'pt');

            let finalQuantity = 0;

            if (quantityVal === 'A4') {
                const altezzaUtileA4Px = 950; 
                const altezzaTestoPx = fontSize * 1.333; 
                const paddingEBordiPx = 18; 
                const altezzaSingoloBoxPx = altezzaTestoPx + paddingEBordiPx;
                const spazioTraBox = 5; 
                const altezzaRigaTotale = altezzaSingoloBoxPx + spazioTraBox;
                
                const righePerPagina = Math.floor(altezzaUtileA4Px / altezzaRigaTotale);
                finalQuantity = righePerPagina * columns;
                
                if (finalQuantity <= 0) finalQuantity = columns; 
            } else {
                finalQuantity = parseInt(quantityVal);
            }

            const stringLength = startNumberInput.length;
            const startNumber = parseInt(startNumberInput, 10);

            for (let i = 0; i < finalQuantity; i++) {
                const currentNumber = startNumber + i;
                const formattedNumber = String(currentNumber).padStart(stringLength, '0');
                
                const styledNumber = formattedNumber
                    .replace(/6/g, '<u>6</u>')
                    .replace(/9/g, '<u>9</u>');
                
                const div = document.createElement('div');
                div.className = 'number-box';
                div.innerHTML = styledNumber; 
                outputDiv.appendChild(div);
            }

            document.getElementById('btn-print').style.display = 'block';
        });
    </script>

</body>
</html>
